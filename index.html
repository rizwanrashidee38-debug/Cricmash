                    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Cricket Career: All-Rounder Edition</title>
    <style>
        :root { --field-green: #2ecc71; --pitch: #f39c12; --dark: #1e272e; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: #2f3542; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .hidden { display: none; }
        
        /* Stats Header */
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #57606f; padding-bottom: 10px; margin-bottom: 15px; font-size: 0.9rem; }
        .match-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        
        /* Tile Mechanic */
        .action-area { margin-top: 20px; }
        .tile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .tile { height: 80px; background: var(--field-green); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; border-bottom: 4px solid #27ae60; transition: 0.1s; }
        .tile:active { transform: translateY(2px); border-bottom: 0; }
        .bowl-tile { background: #3498db; border-bottom-color: #2980b9; }

        /* UI Elements */
        #commentary { font-style: italic; color: #ced6e0; height: 50px; margin: 10px 0; font-size: 0.95rem; border-left: 4px solid var(--pitch); padding-left: 10px; }
        .btn { background: var(--pitch); color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- SETUP -->
    <div id="setup-screen">
        <h2>🏏 Start Your Career</h2>
        <input type="text" id="pName" placeholder="Enter Name">
        <select id="pRole">
            <option value="Batsman">Specialist Batsman</option>
            <option value="All-Rounder">All-Rounder</option>
            <option value="Bowler">Lead Bowler</option>
        </select>
        <button class="btn" onclick="initGame()">Enter League</button>
    </div>

    <!-- TOSS SCREEN -->
    <div id="toss-screen" class="hidden">
        <div class="match-card">
            <h3 id="toss-announcement">Toss is happening...</h3>
            <p id="toss-decision"></p>
            <button class="btn" onclick="startInnings()">Go to Field</button>
        </div>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div id="game-screen" class="hidden">
        <div class="header">
            <div>Div: <span id="ui-div">3</span></div>
            <div>Target: <span id="ui-target">N/A</span></div>
            <div>Match: <span id="ui-match">1</span>/10</div>
        </div>

        <div class="match-card">
            <div id="match-label" style="font-size: 0.8rem; color: #ffa502;">T20 MATCH</div>
            <div id="score-main" style="font-size: 2.2rem; margin: 10px 0;">0/0 (0.0)</div>
            <div id="commentary">The crowd is roaring!</div>
        </div>

        <div class="action-area">
            <p id="action-label" style="text-align: center; margin-bottom: 8px;">Choose your shot:</p>
            <div class="tile-grid" id="tile-container">
                <!-- Tiles generated by JS -->
            </div>
        </div>
    </div>
</div>

<script>
    let p = { name: "", role: "", div: 3, seasonRuns: 0, seasonWicks: 0, matches: 0 };
    let m = { 
        isBatting: true, teamRuns: 0, teamWicks: 0, balls: 0, 
        playerInningsRuns: 0, playerInningsWicks: 0, 
        target: 0, oversPlayed: 0, lastBowlerPos: -1 
    };

    const teams = ["Warriors", "Titans", "Kings", "Strikers", "Blasters", "Shadows"];

    function initGame() {
        p.name = document.getElementById('pName').value || "Pro";
        p.role = document.getElementById('pRole').value;
        document.getElementById('setup-screen').classList.add('hidden');
        performToss();
    }

    function performToss() {
        document.getElementById('toss-screen').classList.remove('hidden');
        let tossWinner = Math.random() > 0.5 ? "Your Team" : "Opponent";
        let choice = Math.random() > 0.5 ? "Bat" : "Bowl";
        
        m.isBatting = (tossWinner === "Your Team" && choice === "Bat") || (tossWinner === "Opponent" && choice === "Bowl");
        
        document.getElementById('toss-announcement').innerText = `${tossWinner} won the toss!`;
        document.getElementById('toss-decision').innerText = `${tossWinner} decided to ${choice} first.`;
    }

    function startInnings() {
        document.getElementById('toss-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        resetMatchState();
        setupTiles();
        updateUI("Match begins!");
    }

    function resetMatchState() {
        m.teamRuns = 0; m.teamWicks = 0; m.balls = 0;
        m.playerInningsRuns = 0; m.playerInningsWicks = 0;
        
        if (m.isBatting) {
            // Simulate start of game if player isn't opening
            m.teamRuns = Math.floor(Math.random() * 40);
            m.balls = Math.floor(Math.random() * 30);
            m.teamWicks = Math.floor(Math.random() * 3);
        }
    }

    function setupTiles() {
        const container = document.getElementById('tile-container');
        container.innerHTML = "";
        const labels = m.isBatting ? ["Defend", "Drive", "Slog", "Cut"] : ["Yorker", "Bouncer", "Length", "Slower"];
        
        labels.forEach(label => {
            let div = document.createElement('div');
            div.className = `tile ${m.isBatting ? '' : 'bowl-tile'}`;
            div.innerText = label;
            div.onclick = () => m.isBatting ? handleBatting(label) : handleBowling(label);
            container.appendChild(div);
        });
        document.getElementById('action-label').innerText = m.isBatting ? "Choose a Shot:" : "Choose Delivery:";
    }

    function handleBatting(shot) {
        let risk = (shot === "Slog") ? 0.35 : (shot === "Defend" ? 0.05 : 0.20);
        let rng = Math.random();
        
        if (rng < risk) {
            m.teamWicks++;
            updateUI("OUT! High risk play didn't pay off.");
            setTimeout(endMatch, 1500);
        } else {
            let runs = calculateRuns(shot);
            m.teamRuns += runs; p.seasonRuns += runs; m.balls++;
            updateUI(`Nice ${shot}! Scored ${runs}.`);
        }
        if (m.balls >= 120) endMatch();
    }

    function handleBowling(type) {
        let rng = Math.random();
        m.balls++;
        // 10% chance for a wicket on any ball
        if (rng < 0.12) {
            m.teamWicks++; p.seasonWicks++;
            updateUI(`WICKET! The ${type} worked perfectly!`);
        } else {
            let runs = Math.floor(Math.random() * 4); // Realistic T20 bowling (0-3 runs)
            m.teamRuns += runs;
            updateUI(`They hit that ${type} for ${runs}.`);
        }
        if (m.balls >= 120 || m.teamWicks >= 10) endMatch();
    }

    function calculateRuns(shot) {
        if (shot === "Defend") return Math.random() > 0.8 ? 1 : 0;
        if (shot === "Slog") return [0, 4, 6][Math.floor(Math.random() * 3)];
        return [1, 2, 4][Math.floor(Math.random() * 3)];
    }

    function endMatch() {
        p.matches++;
        alert(`Match Over! Season Stats: ${p.seasonRuns} Runs, ${p.seasonWicks} Wickets.`);
        if (p.matches >= 10) checkPromotion();
        else performToss();
    }

    function checkPromotion() {
        let success = false;
        if (p.role === "Batsman" && p.seasonRuns >= 300) success = true;
        if (p.role === "All-Rounder" && p.seasonRuns >= 200 && p.seasonWicks >= 5) success = true;
        if (p.role === "Bowler" && p.seasonWicks >= 10) success = true;

        if (success && p.div > 1) {
            p.div--;
            alert("PROMOTED! You are now in Division " + p.div);
        } else {
            alert("Season finished. No promotion this time.");
        }
        p.seasonRuns = 0; p.seasonWicks = 0; p.matches = 0;
    }

    function updateUI(msg) {
        let ov = Math.floor(m.balls / 6) + "." + (m.balls % 6);
        document.getElementById('score-main').innerText = `${m.teamRuns}/${m.teamWicks} (${ov})`;
        document.getElementById('commentary').innerText = msg;
        document.getElementById('ui-div').innerText = p.div;
        document.getElementById('ui-match').innerText = p.matches + 1;
    }
</script>
</body>
</html>
