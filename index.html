        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Cricket Career</title>
    <style>
        :root { --accent: #f1c40f; --bg: #1a1a1a; --card: #2d2d2d; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .hidden { display: none; }
        
        /* Stats & UI */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; font-size: 0.8rem; text-align: center; }
        .match-header { font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px; color: var(--accent); }
        
        /* Gameplay */
        .tile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .tile { height: 70px; background: #27ae60; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.2s; }
        .tile:hover { background: #2ecc71; }
        
        /* Commentary */
        #commentary { height: 60px; font-style: italic; color: #aaa; overflow-y: auto; font-size: 0.9rem; margin: 10px 0; border-left: 3px solid var(--accent); padding-left: 10px; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 8px; border-bottom: 1px solid #444; text-align: left; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; background: #444; color: white; }
        button { background: #2980b9; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <!-- SETUP -->
    <div id="setup-screen" class="card">
        <h2>🏏 Create Your Pro</h2>
        <input type="text" id="pName" placeholder="Player Name">
        <select id="pTeam">
            <option value="Mumbai Hawks">Mumbai Hawks</option>
            <option value="Delhi Dragons">Delhi Dragons</option>
            <option value="Bangalore Bolts">Bangalore Bolts</option>
            <option value="Chennai Cobras">Chennai Cobras</option>
            <option value="Kolkata Knights">Kolkata Knights</option>
            <option value="Punjab Panthers">Punjab Panthers</option>
        </select>
        <label>Batting Position:</label>
        <select id="pPos">
            <option value="1">Opener (#1)</option>
            <option value="3">Top Order (#3)</option>
            <option value="5">Middle Order (#5)</option>
            <option value="7">Finisher (#7)</option>
        </select>
        <button onclick="initGame()">Start Career</button>
    </div>

    <!-- MATCH INTERFACE -->
    <div id="match-screen" class="card hidden">
        <div class="stats-bar">
            <div>Div: <span id="stat-div">3</span></div>
            <div>Season Runs: <span id="stat-runs">0</span></div>
            <div>Match: <span id="stat-match">1</span>/10</div>
        </div>
        <hr>
        <div class="match-header" id="match-vs">TEAM vs OPP</div>
        <div id="score-main" style="font-size: 2rem;">0/0 (0.0)</div>
        <div id="commentary">The toss is complete. Get ready!</div>
        
        <div class="tile-grid" id="tiles">
            <div class="tile" onclick="handleShot()">?</div>
            <div class="tile" onclick="handleShot()">?</div>
            <div class="tile" onclick="handleShot()">?</div>
            <div class="tile" onclick="handleShot()">?</div>
        </div>
    </div>

    <!-- POINTS TABLE -->
    <div id="table-screen" class="card hidden">
        <h3>📊 Points Table (Div <span id="table-div">3</span>)</h3>
        <table id="points-table">
            <thead><tr><th>Team</th><th>P</th><th>W</th><th>Pts</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
        <button onclick="nextMatch()">Next Match</button>
    </div>
</div>

<script>
    let player = { name: "", team: "", pos: 1, div: 3, seasonRuns: 0, matches: 0 };
    let match = { currentOpp: "", teamRuns: 0, teamWicks: 0, balls: 0, playerRuns: 0, isOut: false };
    const teams = ["Mumbai Hawks", "Delhi Dragons", "Bangalore Bolts", "Chennai Cobras", "Kolkata Knights", "Punjab Panthers"];
    let standings = teams.map(t => ({ name: t, p: 0, w: 0, pts: 0 }));

    function initGame() {
        player.name = document.getElementById('pName').value || "Player";
        player.team = document.getElementById('pTeam').value;
        player.pos = parseInt(document.getElementById('pPos').value);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('match-screen').classList.remove('hidden');
        startMatch();
    }

    function startMatch() {
        match.isOut = false;
        match.playerRuns = 0;
        match.balls = 0;
        
        // Pick Opponent
        let others = teams.filter(t => t !== player.team);
        match.currentOpp = others[Math.floor(Math.random() * others.length)];
        document.getElementById('match-vs').innerText = `${player.team} vs ${match.currentOpp}`;
        
        // Simulate score before player comes in
        // Lower position = more runs/wickets already happened
        match.teamWicks = player.pos - 1;
        match.teamRuns = Math.floor(Math.random() * (player.pos * 30));
        match.balls = Math.floor(Math.random() * (player.pos * 18));
        
        updateUI(`You walk out to bat at position ${player.pos}.`);
    }

    function handleShot() {
        if (match.isOut || match.balls >= 120) return;

        let rng = Math.random();
        let comms = "";
        
        if (rng < 0.20) {
            match.isOut = true;
            match.teamWicks++;
            comms = "OUT! That's a huge blow for " + player.team;
            setTimeout(endMatch, 1500);
        } else {
            let runs = [0, 1, 2, 4, 6][Math.floor(Math.random() * 5)];
            match.playerRuns += runs;
            match.teamRuns += runs;
            player.seasonRuns += runs;
            match.balls++;
            comms = runs === 6 ? "SIX! Over the ropes!" : (runs === 4 ? "FOUR! Beautifully timed." : `He takes ${runs}.`);
        }

        if (match.balls >= 120) {
            comms = "Innings over! 20 overs completed.";
            setTimeout(endMatch, 1500);
        }

        updateUI(comms);
    }

    function endMatch() {
        player.matches++;
        // Simple win/loss logic for standings
        standings.find(t => t.name === player.team).p++;
        if (Math.random() > 0.5) {
            standings.find(t => t.name === player.team).w++;
            standings.find(t => t.name === player.team).pts += 2;
        }

        alert(`Match Finished! You scored ${match.playerRuns}. Total season runs: ${player.seasonRuns}`);
        
        document.getElementById('match-screen').classList.add('hidden');
        document.getElementById('table-screen').classList.remove('hidden');
        renderTable();
    }

    function renderTable() {
        let tbody = document.getElementById('table-body');
        tbody.innerHTML = "";
        standings.sort((a,b) => b.pts - a.pts).forEach(t => {
            tbody.innerHTML += `<tr><td>${t.name}</td><td>${t.p}</td><td>${t.w}</td><td>${t.pts}</td></tr>`;
        });
        document.getElementById('table-div').innerText = player.div;
    }

    function nextMatch() {
        if (player.matches >= 10) {
            checkPromotion();
        } else {
            document.getElementById('table-screen').classList.add('hidden');
            document.getElementById('match-screen').classList.remove('hidden');
            startMatch();
        }
    }

    function checkPromotion() {
        if (player.seasonRuns >= 300 && player.div > 1) {
            player.div--;
            alert("PROMOTED TO DIVISION " + player.div);
        } else {
            alert("Season Over. Targets not met for promotion.");
        }
        player.matches = 0; player.seasonRuns = 0;
        nextMatch();
    }

    function updateUI(msg) {
        let ov = Math.floor(match.balls / 6) + "." + (match.balls % 6);
        document.getElementById('score-main').innerText = `${match.teamRuns}/${match.teamWicks} (${ov})`;
        document.getElementById('commentary').innerText = msg;
        document.getElementById('stat-runs').innerText = player.seasonRuns;
        document.getElementById('stat-match').innerText = player.matches + 1;
    }
</script>
</body>
</html>
